trigger:
  - main

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildConfiguration: 'Release'
  refAssembliesDir: '$(Pipeline.Workspace)\refasm'
  feed: 'NADEC/NADEC'                       # project/feed
  packageId: 'SalesPro'
  packageVersion: '1.0.$(Build.BuildId)'

steps:
# --- .NET 4.5 reference assemblies (required, no source edits) ---
- task: NuGetCommand@2
  displayName: 'Get net45 reference assemblies'
  inputs:
    command: 'custom'
    arguments: 'install Microsoft.NETFramework.ReferenceAssemblies.net45 -Version 1.0.3 -OutputDirectory $(refAssembliesDir) -ExcludeVersion'

- powershell: |
    $r = "$(refAssembliesDir)\Microsoft.NETFramework.ReferenceAssemblies.net45\build\.NETFramework\v4.5"
    "<Project><PropertyGroup><FrameworkPathOverride>$r</FrameworkPathOverride></PropertyGroup></Project>" |
      Set-Content "$(Build.SourcesDirectory)\Directory.Build.props"
  displayName: 'Point MSBuild at net45'

# --- Build ---
- task: NuGetCommand@2
  displayName: 'Restore'
  inputs:
    restoreSolution: '$(solution)'

- task: VSBuild@1
  displayName: 'Build'
  inputs:
    solution: '$(solution)'
    configuration: '$(buildConfiguration)'
    msbuildArgs: '/p:OutDir=$(Build.ArtifactStagingDirectory)\out'

# --- Wrap .exe/.dll into a .nupkg ---
- powershell: |
    $nuspec = @"
    <?xml version="1.0"?>
    <package>
      <metadata>
        <id>$(packageId)</id>
        <version>$(packageVersion)</version>
        <authors>CROZ</authors>
        <description>SalesPro .NET 4.5 build $(Build.BuildNumber)</description>
      </metadata>
      <files>
        <file src="$(Build.ArtifactStagingDirectory)\out\**" target="lib" />
      </files>
    </package>
    "@
    Set-Content -Path "$(Build.ArtifactStagingDirectory)\SalesPro.nuspec" -Value $nuspec -Encoding UTF8
  displayName: 'Generate nuspec'

- task: NuGetCommand@2
  displayName: 'Pack'
  inputs:
    command: 'pack'
    packagesToPack: '$(Build.ArtifactStagingDirectory)\SalesPro.nuspec'
    packDestination: '$(Build.ArtifactStagingDirectory)\nupkg'

# --- Push to NADEC feed ---
- task: NuGetCommand@2
  displayName: 'Push to NADEC feed'
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)\nupkg\*.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: '$(feed)'